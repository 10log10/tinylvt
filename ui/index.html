<html lang="en" class="dark">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0">
        <title>TinyLVT - Fair Allocation for Shared Spaces</title>
        <meta name="description" content="TinyLVT uses auctions to allocate shared spaces fairly. From splitting rent among housemates to assigning desks in a workspace, everyone pays according to actual demand.">

        <!-- Open Graph -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="TinyLVT - Fair Allocation for Shared Spaces">
        <meta property="og:description" content="TinyLVT uses auctions to allocate shared spaces fairly. From splitting rent among housemates to assigning desks in a workspace, everyone pays according to actual demand.">
        <meta property="og:url" content="https://tinylvt.com/">
        <meta property="og:site_name" content="TinyLVT">

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary">
        <meta name="twitter:title" content="TinyLVT - Fair Allocation for Shared Spaces">
        <meta name="twitter:description" content="TinyLVT uses auctions to allocate shared spaces fairly. From splitting rent among housemates to assigning desks in a workspace, everyone pays according to actual demand.">

        <script>
            // Set dark mode immediately to prevent flash
            // HTML has class="dark" by default, so we only remove it if needed
            (function() {
                const storedTheme = localStorage.getItem('theme-mode');

                // Remove dark class only if:
                // - User explicitly set light mode, OR
                // - No stored preference AND system prefers light
                if (storedTheme === 'light' ||
                    (storedTheme !== 'dark' && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.remove('dark');
                }
            })();
        </script>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg">
        <link data-trunk rel="rust" data-wasm-opt="0"/>
        <link data-trunk rel="tailwind-css" href="styles.css"/>
        <link data-trunk rel="copy-file" href="assets/favicon.svg"/>
        <link data-trunk rel="copy-file" href="assets/auction-detail-light.jpg"/>
        <link data-trunk rel="copy-file" href="assets/auction-detail-dark.jpg"/>
        <link data-trunk rel="copy-dir" href="../docs" data-target-path="docs-source"/>
    </head>
